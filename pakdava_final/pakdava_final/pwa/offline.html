<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>آفلاین | پک دوا</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',Tahoma,sans-serif;background:#F0F4F8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;direction:rtl}
.card{background:white;border-radius:20px;padding:40px 32px;text-align:center;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.12)}
.icon{font-size:72px;margin-bottom:20px}
h1{font-size:24px;font-weight:800;color:#212529;margin-bottom:10px}
p{font-size:14px;color:#6C757D;line-height:1.7;margin-bottom:24px}
.btn{display:block;width:100%;padding:14px;background:#1A7A4A;color:white;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:10px;transition:background 0.2s}
.btn:hover{background:#0D5C36}
.btn-outline{background:none;border:1.5px solid #DEE2E6;color:#495057}
.status{margin-top:20px;padding:12px;background:#F8F9FA;border-radius:10px;font-size:12px;color:#6C757D}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#E74C3C;margin-left:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>حالت آفلاین</h1>
  <p>اتصال به اینترنت ندارید.<br>داده‌های ذخیره‌شده روی دستگاه همچنان در دسترس هستند. هنگام اتصال مجدد، همگام‌سازی خودکار انجام می‌شود.</p>
  <button class="btn" onclick="tryReload()">🔄 تلاش مجدد</button>
  <a href="./patient/dashboard.php" class="btn btn-outline">📋 رفتن به داشبورد</a>
  <div class="status">
    <span class="dot"></span>
    وضعیت: آفلاین | <span id="pending-count">در حال بررسی...</span>
  </div>
</div>

<script>
function tryReload() {
  if (navigator.onLine) { location.reload(); }
  else { document.querySelector('p').textContent = 'هنوز اتصال برقرار نشده. لطفاً اینترنت را بررسی کنید.'; }
}

window.addEventListener('online', () => location.reload());

// نمایش تعداد رکوردهای در انتظار sync
if ('indexedDB' in window) {
  const req = indexedDB.open('PakDavaDB', 4);
  req.onsuccess = () => {
    const db = req.result;
    const queues = ['clinical_queue','soc_queue','daily_queue','risk_queue'];
    let total = 0;
    let done  = 0;
    queues.forEach(store => {
      if (!db.objectStoreNames.contains(store)) { done++; if(done===queues.length) show(); return; }
      const tx  = db.transaction(store, 'readonly');
      const all = tx.objectStore(store).getAll();
      all.onsuccess = () => {
        total += (all.result||[]).filter(r=>r.synced===0).length;
        done++;
        if (done === queues.length) show();
      };
    });
    function show() {
      document.getElementById('pending-count').textContent =
        total > 0 ? `${total} رکورد در انتظار همگام‌سازی` : 'همه داده‌ها همگام هستند';
    }
  };
}
</script>
</body>
</html>
