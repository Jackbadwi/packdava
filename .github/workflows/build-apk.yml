name: Build PakDava APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ─────────────────────────────────────────────
      - name: ① Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      - name: ② Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─────────────────────────────────────────────
      - name: ③ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─────────────────────────────────────────────
      - name: ④ Install npm dependencies
        run: npm install --legacy-peer-deps

      # ─────────────────────────────────────────────
      - name: ⑤ Build React/Vite
        run: npm run build

      # ─────────────────────────────────────────────
      - name: ⑥ Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: ⑦ Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ─────────────────────────────────────────────
      - name: ⑧ Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: ⑨ Capacitor sync Android
        run: npx cap sync android --deployment
        env:
          CAPACITOR_ANDROID_STUDIO_PATH: ''

      # ─────────────────────────────────────────────
      # اگر google-services.json نداشتیم، یک فایل dummy بساز
      # تا PushNotifications plugin crash نکند
      - name: ⑩ Create dummy google-services.json (if not present)
        run: |
          GSF="android/app/google-services.json"
          if [ ! -f "$GSF" ]; then
            echo "⚠️  google-services.json not found — creating dummy for build"
            cat > "$GSF" << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id":     "pakdava-dummy",
              "storage_bucket": "pakdava-dummy.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "ir.pakdava.app" }
              },
              "oauth_client":    [],
              "api_key":         [{ "current_key": "dummy_key_not_real" }],
              "services": {
                "appinvite_service": { "other_platform_oauth_client": [] }
              }
            }],
            "configuration_version": "1"
          }
          GSEOF
            echo "✅ Dummy google-services.json created"
          else
            echo "✅ google-services.json already exists"
          fi

      # ─────────────────────────────────────────────
      - name: ⑪ Decode real keystore (if secret exists)
        id: keystore
        run: |
          if [ -n "$KS_B64" ] && [ "$KS_B64" != "" ]; then
            echo "$KS_B64" | base64 -d > android/app/release.keystore
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "✅ Keystore decoded — building RELEASE APK"
          else
            echo "mode=debug" >> $GITHUB_OUTPUT
            echo "⚠️  No keystore secret — building DEBUG APK"
          fi
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}

      # ─────────────────────────────────────────────
      - name: ⑫ Build RELEASE APK
        if: steps.keystore.outputs.mode == 'release'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon \
            --stacktrace
        continue-on-error: false

      - name: ⑬ Build DEBUG APK (no keystore)
        if: steps.keystore.outputs.mode == 'debug'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace
        continue-on-error: false

      # ─────────────────────────────────────────────
      - name: ⑭ Upload RELEASE APK
        if: steps.keystore.outputs.mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: pakdava-RELEASE
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: ⑭ Upload DEBUG APK
        if: steps.keystore.outputs.mode == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: pakdava-DEBUG
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ─────────────────────────────────────────────
      - name: ⑮ Create GitHub Release (release only)
        if: steps.keystore.outputs.mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "پک دوا v${{ github.run_number }}"
          body: |
            ## 💊 پک دوا — اپلیکیشن اندروید

            ### نصب
            ۱. فایل `app-release.apk` را دانلود کنید
            ۲. در تنظیمات اندروید → Security → نصب از منابع ناشناس را فعال کنید
            ۳. فایل APK را نصب کنید
            ۴. آدرس سرور: `https://myhealthcare.ir/packdava`

            ### تغییرات
            ${{ github.event.head_commit.message }}

            ---
            *ساخته‌شده توسط GitHub Actions — ${{ github.sha }}*
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
